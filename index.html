   ///////////////////////////////////////////////////////
    let watchId = null;
    let lastPosition = null;
    
    // Start tracking
    document.getElementById("start").addEventListener("click", (e) => {
        e.preventDefault()
        if (!navigator.geolocation) {
            console.log("Geolocation not supported");
            return;
        }

        if (watchId !== null) {
            console.log("Already tracking...");
            return;
        }

        watchId = navigator.geolocation.watchPosition(// ✅ SUCCESS
            (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                latitudePos = pos.coords.latitude;
                L.Routing.control({
                    waypoints: [
                        L.latLng(-26.019042486045866, 32.40057233099401), // start
                        L.latLng(lat, lng )      // end
                    ],
                    lineOptions: {
                    styles: [
                        {
                            color: 'blue',
                            weight: 5,
                            opacity: 0.7
                        }
                        ]
                    },show: false // hides the routing control panel
                    
                }).addTo(map);

                console.log("📍 Live Location:", lat, lng );
            },

            // ❌ ERROR HANDLER
            (err) => {
                console.log("⚠️ Error:", err.message);

                switch (err.code) {
                    case err.PERMISSION_DENIED:
                        console.log("User denied location access");
                        break;

                    case err.POSITION_UNAVAILABLE:
                        console.log("Location unavailable (Mac/Wi-Fi issue)");
                        break;

                    case err.TIMEOUT:
                        console.log("Request timed out, retrying...");
                        retryLocation();
                        break;

                    default:
                        console.log("Unknown error");
                }

                    // 🔁 fallback to last known position
                    if (lastPosition) {
                        console.log("📌 Using last known location:",
                            lastPosition.coords.latitude,
                            lastPosition.coords.longitude
                        );
                    }
                },

                // ⚙️ OPTIONS (optimized for Mac + general use)
                {
                    enableHighAccuracy: false,
                    timeout: 20000,
                    maximumAge: 10000
                }
            );
        });

        // Stop tracking
        document.getElementById("stop").addEventListener("click", () => {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                console.log("🛑 Tracking stopped");
            }
    });

    // 🔁 Retry function
    function retryLocation() {
        setTimeout(() => {
            console.log("🔄 Retrying location...");
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    console.log("✅ Retry success:",
                        pos.coords.latitude,
                        pos.coords.longitude
                    );
                    lastPosition = pos;
                },
                (err) => {
                    console.log("❌ Retry failed:", err.message);
                }
            );
        }, 3000);
    }

</script>
